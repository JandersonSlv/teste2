<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Host Principal</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  <h1>Meu Site (Host)</h1>
  <p>O botão abaixo vem de outro deploy:</p>

  <div id="button-container">Carregando...</div>

  <script src="https://teste2-nine-alpha.vercel.app/component.js"></script>

  <script>
    // Como o script acima é síncrono, quando chegarmos aqui, 
    // a função já estará disponível no objeto window.
    if (typeof window.renderRemoteButton === 'function') {
        window.renderRemoteButton('button-container');
    } else {
        document.getElementById('button-container').innerText = 'Falha ao carregar o botão.';
    }
  </script>
</body>
</html>
